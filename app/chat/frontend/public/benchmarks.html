<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lm-arena — Benchmarks</title>
  <link rel="stylesheet" href="./shared.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    main {
      flex: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .page-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 28px;
    }
    h1 { font-size: 20px; font-weight: 600; }

    select {
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: var(--radius);
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--accent); }

    .state-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding-top: 80px; color: var(--text-secondary);
    }

    .suite-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .tab {
      padding: 5px 14px; border-radius: var(--radius);
      font-size: 12.5px; cursor: pointer;
      background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary);
    }
    .tab:hover { border-color: var(--text-secondary); color: var(--text); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Suite tooltip */
    .tab-wrap { position: relative; display: inline-flex; align-items: center; gap: 4px; }
.tip-box {
      position: absolute; bottom: calc(100% + 8px); left: 0;
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 10px;
      font-size: 11.5px; color: var(--text-secondary); line-height: 1.5;
      width: 230px; pointer-events: none;
      opacity: 0; transition: opacity .15s;
      z-index: 20;
    }
    .tip-box strong { color: var(--text); font-weight: 600; display: block; margin-bottom: 2px; }
    .tab-wrap:hover .tip-box { opacity: 1; }

    /* Summary table */
    .table-wrap { overflow-x: auto; margin-bottom: 40px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; padding: 8px 12px;
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .04em;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 10px 12px; vertical-align: top; }
    tbody tr:hover > td { background: var(--surface-raised); }

    .model-cell { display: flex; align-items: flex-start; gap: 8px; }
    .model-icon { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; opacity: .85; }
    .model-name { font-weight: 500; font-size: 13px; }
    .model-sub  { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    .bar-cell { min-width: 100px; }
    .bar-bg   { background: var(--surface-raised); border-radius: 3px; height: 6px; margin-top: 2px; }
    .bar-fill { height: 6px; border-radius: 3px; background: var(--accent); }

    /* Expand toggle */
    .expand-btn {
      background: none; border: none; color: var(--text-secondary);
      cursor: pointer; font-size: 11px; padding: 2px 0;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .expand-btn:hover { color: var(--text); }

    /* Traces */
    .traces-row td { padding: 0; }
    .traces-wrap {
      border-top: 1px solid var(--border);
      padding: 12px 16px 16px;
    }
    .trace-header {
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .04em;
      margin-bottom: 10px;
    }
    .trace-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12.5px;
    }
    .trace-item:last-child { border-bottom: none; }
    .trace-prompt { color: var(--text-secondary); margin-bottom: 4px; }
    .trace-response {
      font-family: var(--font-mono); font-size: 12px;
      color: var(--text); white-space: pre-wrap; word-break: break-word;
      margin-bottom: 4px;
    }
    .trace-think {
      margin-bottom: 4px;
    }
    .trace-think summary {
      font-size: 11px; color: var(--text-secondary); cursor: pointer;
      list-style: none; display: inline-flex; align-items: center; gap: 4px;
      user-select: none;
    }
    .trace-think summary::before { content: '▶'; font-size: 9px; }
    .trace-think[open] summary::before { content: '▼'; }
    .trace-think summary:hover { color: var(--text); }
    .trace-think .think-body {
      font-family: var(--font-mono); font-size: 11.5px;
      color: var(--text-secondary); white-space: pre-wrap; word-break: break-word;
      border-left: 2px solid var(--border); margin-top: 6px; padding-left: 10px;
    }
    .trace-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 12px; }
    .badge-offline { background: rgba(139,148,158,.12); color: var(--text-secondary); }
    .row-offline td { opacity: .45; }
  </style>
</head>
<body>

<header>
  <span class="header-title">lm-arena</span>
  <span class="header-sub">/ benchmarks</span>
  <div class="header-sep"></div>
  <nav class="header-nav">
    <a href="/">Chat</a>
    <a href="/admin.html">Admin</a>
  </nav>
</header>

<main id="main">
  <div class="state-wrap">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>
</main>

<footer>
  <a href="https://github.com/lm-arena/lm-arena.github.io" target="_blank">lm-arena/lm-arena.github.io</a>
  <a href="https://github.com/lm-arena/lm-arena.github.io/actions/workflows/benchmark.yml" target="_blank">benchmark runs</a>
</footer>

<script>
  const SUITES = ['overall', 'mmlu', 'instruct', 'gsm8k'];

  const SUITE_INFO = {
    overall: {
      label: 'overall',
      name: 'Overall',
      desc: 'Aggregate latency (P50/max) and throughput across all suites. No accuracy score — pure speed.',
    },
    mmlu: {
      label: 'mmlu · 10q',
      name: 'mini-MMLU',
      full: 'mini-MMLU (10 questions)',
      desc: 'Factual knowledge across science, history, and math. 10-question proxy — not comparable to published MMLU scores (57 subjects, 14k questions). Grading: word-boundary substring match (e.g. "Au" in response).',
    },
    instruct: {
      label: 'instruct · 8q',
      name: 'Instruct',
      desc: 'Instruction following — 8 prompts requiring precise format compliance (single word, exact number). Tests whether the model follows directions without rambling. Grading: strict — word-boundary match AND response is 3 words or fewer.',
    },
    gsm8k: {
      label: 'gsm8k · 5q',
      name: 'mini-GSM8K',
      full: 'mini-GSM8K (5 questions)',
      desc: 'Arithmetic word problems requiring multi-step reasoning. 5-question proxy — not comparable to published GSM8K scores (8,500 problems). Grading: word-boundary substring match for the numeric answer.',
    },
  };

  let runData    = {};   // model_id → metrics for active run
  let modelMeta  = {};   // model_id → { name, description }
  let activeSuite = 'overall';
  let expanded    = new Set();
  let runs        = [];  // available run dates, newest first

  const $main = document.getElementById('main');

  // ---------------------------------------------------------------------------
  // Load
  // ---------------------------------------------------------------------------

  async function loadIndex() {
    const res = await fetch('./benchmarks/index.json');
    if (!res.ok) throw new Error('index not found');
    runs = await res.json();
    if (!runs.length) throw new Error('no runs yet');
  }

  async function loadRun(date) {
    expanded.clear();
    const res = await fetch(`./benchmarks/${date}.json`);
    if (!res.ok) throw new Error(`run ${date} not found`);
    runData = await res.json();
    render(date);
  }

  async function loadModelMeta() {
    try {
      const res = await fetch('./models.json');
      if (!res.ok) return;
      const data = await res.json();
      // Index by `key` (tunnel routing key, e.g. "lfm2thinking") — matches m.model in benchmark data
      modelMeta = Object.fromEntries(
        (data.models ?? [])
          .filter(m => m.key)
          .map(m => [m.key, { name: m.name, description: m.description, owned_by: m.owned_by }])
      );
    } catch { /* non-fatal */ }
  }

  async function init() {
    try {
      await Promise.all([loadIndex(), loadModelMeta()]);
      await loadRun(runs[0]);
    } catch (e) {
      $main.innerHTML = `
        <div class="state-wrap">
          <p>${e.message === 'index not found' || e.message === 'no runs yet'
            ? `No results yet. Trigger the <a href="https://github.com/lm-arena/lm-arena.github.io/actions/workflows/benchmark.yml" style="color:var(--accent)">benchmark workflow</a> to generate results.`
            : `Failed to load: ${escHtml(e.message)}`
          }</p>
        </div>`;
    }
  }

  // ---------------------------------------------------------------------------
  // Render
  // ---------------------------------------------------------------------------

  // Maps owned_by values from models.json to favicon domains.
  // Update when adding new providers to config/models.py.
  const FAVICON_DOMAINS = {
    'qwen':           'qwen.ai',
    'microsoft':      'microsoft.com',
    'google':         'deepmind.google',
    'huggingfacetb':  'huggingface.co',
    'liquidai':       'liquid.ai',
    'alibaba-apsara': 'alibabacloud.com',
    'openbmb':        'openbmb.cn',
    'janhq':          'jan.ai',
    'meta':           'meta.com',
    'tii':            'falconllm.tii.ae',
    'essentialai':    'essential.ai',
    'deepseek':       'deepseek.com',
    'nanbeige':       'huggingface.co',
    'openai':         'openai.com',
  };

  function modelIcon(owned_by) {
    const domain = FAVICON_DOMAINS[owned_by];
    if (!domain) return '';
    const src = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
    return `<img class="model-icon" src="${src}" alt="" loading="lazy">`;
  }

  function fmt(v) {
    if (v == null) return '<span class="na">—</span>';
    return `<span class="val">${v}</span>`;
  }

  function renderTraces(modelId, suiteName) {
    const suite = runData[modelId]?.suites?.[suiteName];
    if (!suite?.traces?.length) return '<div class="traces-wrap"><p style="font-size:12px;color:var(--text-secondary)">No traces available.</p></div>';

    const items = suite.traces.map(t => {
      let responseHtml;
      if (t.response == null) {
        responseHtml = `<div class="trace-response na">— no response —</div>`;
      } else {
        const thinkMatch = t.response.match(/^<think>([\s\S]*?)<\/think>\s*/);
        if (thinkMatch) {
          const thinking = thinkMatch[1].trim();
          const answer = t.response.slice(thinkMatch[0].length).trim();
          responseHtml = `
            <details class="trace-think">
              <summary>thinking</summary>
              <div class="think-body">${escHtml(thinking)}</div>
            </details>
            ${answer ? `<div class="trace-response">${escHtml(answer)}</div>` : ''}`;
        } else {
          responseHtml = `<div class="trace-response">${escHtml(t.response)}</div>`;
        }
      }
      return `
      <div class="trace-item">
        <div class="trace-prompt">${escHtml(t.prompt)}</div>
        ${responseHtml}
        <div class="trace-meta">
          ${t.timed_out
            ? `<span class="badge badge-offline">timeout</span>`
            : t.responded === false
            ? `<span class="badge badge-offline">empty</span>`
            : `<span class="badge ${t.correct ? 'badge-pass' : 'badge-fail'}">${t.correct ? 'pass' : 'fail'}</span>`}
          <span>expected: <span style="font-family:var(--font-mono)">${escHtml(t.expected)}</span></span>
          ${t.latency_ms != null ? `<span>${t.latency_ms} ms</span>` : ''}
        </div>
      </div>`;
    }).join('');

    return `<div class="traces-wrap">
      <div class="trace-header">${suiteName} — per-prompt traces</div>
      ${items}
    </div>`;
  }

  function render(activeDate) {
    const models = Object.values(runData);
    if (!models.length) {
      $main.innerHTML = `<div class="state-wrap"><p>Run produced no results.</p></div>`;
      return;
    }

    const sorted = [...models].sort((a, b) => {
      if (activeSuite === 'overall') {
        return (a.overall?.p50_ms ?? Infinity) - (b.overall?.p50_ms ?? Infinity);
      }
      const accDiff = (b.suites?.[activeSuite]?.accuracy ?? -1) - (a.suites?.[activeSuite]?.accuracy ?? -1);
      if (accDiff !== 0) return accDiff;
      return (a.suites?.[activeSuite]?.p50_ms ?? Infinity) - (b.suites?.[activeSuite]?.p50_ms ?? Infinity);
    });

    const runSelector = runs.length > 1
      ? `<select onchange="switchRun(this.value)">${
          runs.map(r => `<option value="${r}"${r === activeDate ? ' selected' : ''}>${r}</option>`).join('')
        }</select>`
      : `<span style="font-size:12px;color:var(--text-secondary)">${activeDate}</span>`;

    const tabs = SUITES.map(s => {
      const info = SUITE_INFO[s];
      const tooltip = `<div class="tip-box"><strong>${info.full ?? info.name}</strong>${info.desc}</div>`;
      return `<div class="tab-wrap">
        <button class="tab${s === activeSuite ? ' active' : ''}" onclick="setTab('${s}','${activeDate}')">${info.label}</button>
        ${tooltip}
      </div>`;
    }).join('');

    let thead, rows;

    if (activeSuite === 'overall') {
      thead = `<tr>
        <th>Model</th>
        <th>P50 latency</th>
        <th>Max latency</th>
        <th>Tokens/sec</th>
      </tr>`;
      rows = sorted.map(m => {
        const o = m.overall || {};
        const tps = o.avg_tokens_per_sec ?? 0;
        const meta = modelMeta[m.model] || {};
        const offline = m.functional === false;
        return `<tr${offline ? ' class="row-offline"' : ''}>
          <td>
            <div class="model-cell">
              ${modelIcon(meta.owned_by)}
              <div>
                <div class="model-name">${meta.name ?? m.model}${offline ? ' <span class="badge badge-offline">not responding</span>' : ''}</div>
                ${meta.description ? `<div class="model-sub">${escHtml(meta.description)}</div>` : ''}
              </div>
            </div>
          </td>
          <td>${o.p50_ms != null ? fmt(o.p50_ms + ' ms') : fmt(null)}</td>
          <td>${o.max_ms != null ? fmt(o.max_ms + ' ms') : fmt(null)}</td>
          <td>${tps ? fmt(tps + ' ' + (m.tps_label || 't/s')) : fmt(null)}</td>
        </tr>`;
      }).join('');
    } else {
      thead = `<tr>
        <th>Model</th>
        <th>Accuracy</th>
        <th>P50 latency</th>
        <th></th>
      </tr>`;
      rows = sorted.flatMap(m => {
        const s = m.suites?.[activeSuite] || {};
        const acc = s.accuracy ?? null;
        const pct = acc != null ? Math.round(acc * 100) : 0;
        const key = `${m.model}:${activeSuite}`;
        const isOpen = expanded.has(key);

        const accCell = acc != null
          ? fmt(pct + '%') + (s.prompts != null ? ` <span style="color:var(--text-secondary);font-size:11px">(${Math.round(acc * s.prompts)}/${s.prompts})</span>` : '')
          : fmt(null);

        const meta = modelMeta[m.model] || {};
        const offline = m.functional === false;
        const summaryRow = `<tr${offline ? ' class="row-offline"' : ''}>
          <td>
            <div class="model-cell">
              ${modelIcon(meta.owned_by)}
              <div>
                <div class="model-name">${meta.name ?? m.model}${offline ? ' <span class="badge badge-offline">not responding</span>' : ''}</div>
                ${meta.description ? `<div class="model-sub">${escHtml(meta.description)}</div>` : ''}
              </div>
            </div>
          </td>
          <td>${accCell}</td>
          <td>${s.p50_ms != null ? fmt(s.p50_ms + ' ms') : fmt(null)}</td>
          <td><button class="expand-btn" onclick="toggleTraces('${m.model}','${activeSuite}','${activeDate}')">${isOpen ? 'hide traces' : 'show traces'}</button></td>
        </tr>`;

        const traceRow = isOpen ? `<tr class="traces-row"><td colspan="4">${renderTraces(m.model, activeSuite)}</td></tr>` : '';
        return [summaryRow, traceRow].filter(Boolean).join('');
      }).join('');
    }

    $main.innerHTML = `
      <div class="page-header">
        <h1>Benchmarks</h1>
        ${runSelector}
      </div>
      <div class="suite-tabs">${tabs}</div>
      <div class="table-wrap">
        <table>
          <thead>${thead}</thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ---------------------------------------------------------------------------
  // Interactions
  // ---------------------------------------------------------------------------

  function setTab(suite, date) {
    activeSuite = suite;
    expanded.clear();
    render(date);
  }

  function switchRun(date) {
    $main.innerHTML = '<div class="state-wrap"><div class="spinner"></div><p>Loading…</p></div>';
    loadRun(date);
  }

  function toggleTraces(modelId, suite, date) {
    const key = `${modelId}:${suite}`;
    if (expanded.has(key)) expanded.delete(key);
    else expanded.add(key);
    render(date);
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  init();
</script>
</body>
</html>
