<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <link rel="stylesheet" href="./shared.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    /* ── Header extras ── */
    .header-nav a { text-decoration: none; }
    #user-area    { display: flex; align-items: center; gap: 10px; }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px;
    }

    /* ── Sign in ── */
    .signin-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-top: 80px;
      text-align: center;
    }
    .signin-wrap h1 { font-size: 24px; font-weight: 600; }
    .signin-wrap p  { font-size: 13px; color: var(--text-secondary); }

    /* ── Loading ── */
    .state-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding-top: 80px;
      text-align: center;
      color: var(--text-secondary);
    }

    /* ── Buttons ── */
    button { font-family: inherit; cursor: pointer; border: none; border-radius: var(--radius); }
    .btn-primary   { background: var(--accent); color: #fff; padding: 9px 20px; font-size: 13.5px; font-weight: 500; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface-raised); color: var(--text); padding: 7px 14px;
      font-size: 12.5px; border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--text-secondary); }
    .btn-ghost  { background: transparent; color: var(--text-secondary); padding: 5px 10px; font-size: 12px;
      border: 1px solid var(--border); }
    .btn-ghost:hover  { color: var(--text); border-color: var(--text-secondary); }
    .btn-danger { background: transparent; color: var(--danger); padding: 5px 12px; font-size: 12px;
      border: 1px solid var(--danger); }
    .btn-danger:hover  { background: rgba(248,81,73,.08); }
    .btn-success { background: transparent; color: var(--success); padding: 5px 12px; font-size: 12px;
      border: 1px solid var(--success); }
    .btn-success:hover { background: rgba(63,185,80,.08); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .controls-left  { display: flex; align-items: center; gap: 10px; }
    .controls-right { display: flex; align-items: center; gap: 8px; }
    .controls h2 { font-size: 15px; font-weight: 600; }
    .run-count   { font-size: 12px; color: var(--text-secondary); }

    /* ── Model list ── */
    .model-list { display: flex; flex-direction: column; gap: 8px; }

    .model-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .model-card.running { border-color: rgba(63,185,80,.3); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--border);
    }
    .status-dot.running  { background: var(--success); box-shadow: 0 0 6px rgba(63,185,80,.5); }
    .status-dot.starting { background: var(--warning); animation: pulse 1.2s ease-in-out infinite; }
    .status-dot.stopping { background: var(--danger); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    .model-info  { flex: 1; min-width: 0; }
    .model-name  { font-size: 13.5px; font-weight: 500; }
    .model-key   { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

    .model-status         { font-size: 11.5px; color: var(--text-secondary); margin-right: 4px; }
    .model-status.running { color: var(--success); }

    .runner-badge {
      font-size: 10px; color: var(--text-secondary);
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 6px; font-family: var(--font-mono);
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      padding: 10px 16px; border-radius: 6px;
      font-size: 13px; z-index: 999; color: #e6edf3;
    }
    .toast-error { background: #3d1c1c; border: 1px solid var(--danger); }
    .toast-info  { background: #1c3d2d; border: 1px solid var(--success); }
  </style>
</head>
<body>

<header id="header" hidden>
  <span class="header-title">lm-arena</span>
  <span class="header-sub">/ admin</span>
  <div class="header-sep"></div>
  <nav class="header-nav">
    <a href="/">Chat</a>
    <a href="/benchmarks.html">Benchmarks</a>
  </nav>
  <div id="user-area"></div>
</header>

<main id="main"></main>

<footer id="footer" hidden>
  <a href="https://github.com/lm-arena/lm-arena.github.io" target="_blank">lm-arena/lm-arena.github.io</a>
  <a href="https://github.com/lm-arena/lm-arena.github.io/actions" target="_blank">actions</a>
</footer>

<script>
  const REPO     = 'lm-arena/lm-arena.github.io';
  const API      = 'https://api.github.com';
  const REGISTRY = 'https://tunnel-registry.jonasneves.workers.dev';
  const AUTH_KEY = 'github_auth'; // shared with main app

  let MODELS = []; // populated at load time from /models.json

  const $main   = document.getElementById('main');
  const $header = document.getElementById('header');
  const $footer = document.getElementById('footer');
  const $uarea  = document.getElementById('user-area');

  let token     = null;
  let tunnelMap = {};   // model key → { url, runner_account } (truthy = running)
  let pending   = new Set();
  let stopping  = new Set();
  let pollTimer = null;

  function setChrome(visible) {
    $header.hidden = !visible;
    $footer.hidden = !visible;
    document.title = visible ? 'lm-arena — Admin' : 'Admin';
    if (!visible) $uarea.innerHTML = '';
  }

  // ── Init ──────────────────────────────────────────────────────────────

  function init() {
    try {
      const stored = localStorage.getItem(AUTH_KEY);
      if (stored) token = JSON.parse(stored).token;
    } catch {}

    if (token) {
      setChrome(true);
      $uarea.innerHTML = `<button class="btn-ghost" onclick="signOut()">Sign out</button>`;
      loadStatus();
    } else {
      renderNotLoggedIn();
    }
  }

  // ── Auth ──────────────────────────────────────────────────────────────

  function signOut() {
    token = null;
    tunnelMap = {};
    pending.clear();
    stopping.clear();
    clearInterval(pollTimer);
    setChrome(false);
    renderNotLoggedIn();
  }

  // ── API ───────────────────────────────────────────────────────────────

  async function ghFetch(path, opts = {}) {
    const res = await fetch(`${API}${path}`, {
      ...opts,
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        ...opts.headers,
      },
    });
    if (res.status === 401) { signOut(); throw new Error('Unauthorized'); }
    return res;
  }

  async function fetchTunnels() {
    const res = await fetch(`${REGISTRY}/tunnels`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json(); // { model: { url, runner_account } }
  }

  async function fetchModels() {
    const res = await fetch('/models.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return data.models
      .filter(m => m.type === 'self-hosted' && m.key)
      .sort((a, b) => a.priority - b.priority)
      .map(m => ({ key: m.key, name: m.name }));
  }

  async function loadStatus() {
    renderLoading('Loading…');
    try {
      [MODELS, tunnelMap] = await Promise.all([fetchModels(), fetchTunnels()]);
      renderModels();
      schedulePoll();
    } catch (e) {
      showToast('Failed to load status: ' + e.message, 'error');
    }
  }

  async function refreshStatus() {
    try {
      tunnelMap = await fetchTunnels();
      for (const key of [...pending])  { if (tunnelMap[key])  pending.delete(key); }
      for (const key of [...stopping]) { if (!tunnelMap[key]) stopping.delete(key); }
      renderModels();
    } catch {}
  }

  async function startModel(key) {
    pending.add(key);
    renderModels();
    try {
      const res = await ghFetch(
        `/repos/${REPO}/actions/workflows/inference.yml/dispatches`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref: 'main', inputs: { model: key } }),
        }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      showToast(`Started ${key}`);
      // Poll more frequently while starting
      setTimeout(refreshStatus, 5000);
      setTimeout(refreshStatus, 15000);
      setTimeout(refreshStatus, 30000);
    } catch (e) {
      if (e.message !== 'Unauthorized')
        showToast(`Failed to start ${key}: ` + e.message, 'error');
      pending.delete(key);
      renderModels();
    }
  }

  async function stopModel(key) {
    stopping.add(key);
    renderModels();
    try {
      const res = await fetch(`${REGISTRY}/signal/${key}`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ signal: 'stop' }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      showToast(`Stop signal sent to ${key} — shuts down within ~30s`);
      // Runner deletes its tunnel entry on shutdown; poll to confirm
      setTimeout(refreshStatus, 15000);
      setTimeout(refreshStatus, 35000);
    } catch (e) {
      showToast(`Failed to stop ${key}: ` + e.message, 'error');
      stopping.delete(key);
      renderModels();
    }
  }

  async function startAll() {
    pending.add('__all__');
    renderModels();
    try {
      const res = await ghFetch(
        `/repos/${REPO}/actions/workflows/inference-all.yml/dispatches`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref: 'main' }),
        }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      // Mark all non-running models as pending
      for (const m of MODELS) {
        if (!tunnelMap[m.key]) pending.add(m.key);
      }
      showToast('Starting all models…');
      setTimeout(refreshStatus, 10000);
      setTimeout(refreshStatus, 30000);
    } catch (e) {
      if (e.message !== 'Unauthorized')
        showToast('Failed to start all: ' + e.message, 'error');
    } finally {
      pending.delete('__all__');
      renderModels();
    }
  }

  async function stopAll() {
    await Promise.all(MODELS.filter(m => tunnelMap[m.key]).map(m => stopModel(m.key)));
  }

  async function purgeStale() {
    try {
      const res = await fetch(`${REGISTRY}/purge`, { method: 'POST' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const { purged } = await res.json();
      showToast(purged.length ? `Purged ${purged.length} stale ${purged.length === 1 ? 'entry' : 'entries'}` : 'Nothing to purge');
      if (purged.length) refreshStatus();
    } catch (e) {
      showToast('Purge failed: ' + e.message, 'error');
    }
  }

  function schedulePoll() {
    clearInterval(pollTimer);
    pollTimer = setInterval(refreshStatus, 30000);
  }

  // ── Render ────────────────────────────────────────────────────────────

  function renderNotLoggedIn() {
    $main.innerHTML = `
      <div class="signin-wrap">
        <h1>lm-arena admin</h1>
        <p>Sign in to GitHub on the <a href="/" style="color:var(--accent-hover)">main page</a> first.</p>
      </div>`;
  }

  function renderLoading(msg) {
    $main.innerHTML = `
      <div class="state-wrap">
        <div class="spinner"></div>
        <p>${msg}</p>
      </div>`;
  }

  function renderModels() {
    const runningCount = MODELS.filter(m => tunnelMap[m.key]).length;

    const cards = MODELS.map(m => {
      const isRunning  = !!tunnelMap[m.key];
      const isPending  = pending.has(m.key);
      const isStopping = stopping.has(m.key);

      let dotClass, statusText;
      if (isStopping)    { dotClass = 'stopping'; statusText = 'stopping…'; }
      else if (isPending) { dotClass = 'starting'; statusText = 'starting…'; }
      else if (isRunning) { dotClass = 'running';  statusText = 'running'; }
      else                { dotClass = '';          statusText = ''; }

      let btn;
      if (isStopping || isPending) {
        btn = `<button class="btn-ghost" disabled>…</button>`;
      } else if (isRunning) {
        btn = `<button class="btn-danger" onclick="stopModel('${m.key}')">Stop</button>`;
      } else {
        btn = `<button class="btn-success" onclick="startModel('${m.key}')">Start</button>`;
      }

      const entry = tunnelMap[m.key];
      const runnerAccount = entry?.runner_account;
      const runnerBadge = runnerAccount ? `<span class="runner-badge">${esc(runnerAccount)}</span>` : '';

      return `
        <div class="model-card${isRunning ? ' running' : ''}">
          <div class="status-dot ${dotClass}"></div>
          <div class="model-info">
            <div class="model-name">${esc(m.name)}</div>
            <div class="model-key">${esc(m.key)}</div>
          </div>
          ${runnerBadge}
          <span class="model-status${isRunning ? ' running' : ''}">${statusText}</span>
          ${btn}
        </div>`;
    }).join('');

    $main.innerHTML = `
      <div class="controls">
        <div class="controls-left">
          <h2>Models</h2>
          <span class="run-count">${runningCount} / ${MODELS.length} running</span>
        </div>
        <div class="controls-right">
          <button class="btn-secondary" onclick="purgeStale()">Purge stale</button>
          <button class="btn-secondary" onclick="refreshStatus()">Refresh</button>
          <button class="btn-secondary" onclick="stopAll()">Stop all</button>
          <button class="btn-primary" onclick="startAll()">Start all</button>
        </div>
      </div>
      <div class="model-list">${cards}</div>`;
  }

  // ── Helpers ───────────────────────────────────────────────────────────

  const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  let _toast = null;
  let _toastTimer = null;
  function showToast(msg, type = 'info') {
    if (!_toast) {
      _toast = document.createElement('div');
      document.body.appendChild(_toast);
    }
    _toast.className = `toast ${type === 'error' ? 'toast-error' : 'toast-info'}`;
    _toast.textContent = msg;
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { _toast.remove(); _toast = null; }, 4000);
  }

  init();
</script>
</body>
</html>
