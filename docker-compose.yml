# Usage:
#   docker compose --profile all up        # Start all inference servers
#   docker compose --profile qwen up       # Start qwen
#   docker compose --profile qwen --profile phi up  # Start qwen + phi

x-common-env: &common-env
  HF_TOKEN: ${HF_TOKEN}

x-inference-common: &inference-common
  networks:
    - llm-network
  restart: unless-stopped
  environment:
    <<: *common-env

services:
  qwen:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.inference
    environment:
      <<: *common-env
      MODEL_NAME: qwen
    ports:
      - "${QWEN_PORT:-8100}:8000"
    profiles: ["all", "qwen"]

  phi:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.inference
    environment:
      <<: *common-env
      MODEL_NAME: phi
    ports:
      - "${PHI_PORT:-8101}:8000"
    profiles: ["all", "phi"]

  lfm2:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.llama-server
      args:
        MODEL_DIR: lfm2-inference
    ports:
      - "${LFM2_PORT:-8105}:8000"
    profiles: ["all", "lfm2"]

  llama:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.inference
    environment:
      <<: *common-env
      MODEL_NAME: llama
    ports:
      - "${LLAMA_PORT:-8201}:8000"
    profiles: ["all", "llama"]

  gemma:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.inference
    environment:
      <<: *common-env
      MODEL_NAME: gemma
    ports:
      - "${GEMMA_PORT:-8200}:8000"
    profiles: ["all", "gemma"]

  r1qwen:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.inference
    environment:
      <<: *common-env
      MODEL_NAME: r1qwen
    ports:
      - "${R1QWEN_PORT:-8300}:8000"
    profiles: ["all", "r1qwen"]

  rnj:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.llama-server
      args:
        MODEL_DIR: rnj-inference
    ports:
      - "${RNJ_PORT:-8203}:8000"
    profiles: ["all", "rnj"]

  smollm3:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.inference
    environment:
      <<: *common-env
      MODEL_NAME: smollm3
    ports:
      - "${SMOLLM3_PORT:-8104}:8000"
    profiles: ["all", "smollm3"]

  functiongemma:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.inference
    environment:
      <<: *common-env
      MODEL_NAME: functiongemma
    ports:
      - "${FUNCTIONGEMMA_PORT:-8103}:8000"
    profiles: ["all", "functiongemma"]

  nanbeige:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.inference
    environment:
      <<: *common-env
      MODEL_NAME: nanbeige
    ports:
      - "${NANBEIGE_PORT:-8301}:8000"
    profiles: ["all", "nanbeige"]

  gptoss:
    <<: *inference-common
    build:
      context: .
      dockerfile: ./app/shared/Dockerfile.inference
    environment:
      <<: *common-env
      MODEL_NAME: gptoss
    ports:
      - "${GPTOSS_PORT:-8303}:8000"
    profiles: ["all", "gptoss"]

networks:
  llm-network:
    driver: bridge
