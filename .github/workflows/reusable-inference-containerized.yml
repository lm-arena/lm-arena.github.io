name: Reusable Containerized Inference

on:
  workflow_call:
    inputs:
      model_name:
        required: true
        type: string
      model_dir:
        required: true
        type: string
      model_repo:
        required: true
        type: string
      model_file:
        required: true
        type: string
      cache_key_prefix:
        required: true
        type: string
      workflow_file:
        required: true
        type: string
      duration_hours:
        type: string
        default: '5'
      port:
        type: string
        default: '8000'
    secrets:
      hf_token:
        required: true
      tunnel_token:
        required: false
        description: 'Tunnel token (optional if tunnels_json is provided)'
      tunnels_json:
        required: false
        description: 'tunnels.json content as JSON string (alternative to tunnel_token)'

jobs:
  inference:
    name: ${{ inputs.model_name }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 350
    permissions:
      actions: write
      contents: read
      packages: read

    steps:
      - name: Find previous workflow
        id: find_previous
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all in-progress runs for this workflow file
          API_RESPONSE=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ inputs.workflow_file }}/runs?status=in_progress")

          # Filter by model name (run name starts with model name)
          # Only kill previous runs of the SAME model, not other models
          PREVIOUS_RUN_ID=$(echo "$API_RESPONSE" | jq -r \
            ".workflow_runs[] | select(.id < ${{ github.run_id }} and (.display_title | startswith(\"${{ inputs.model_name }}\"))) | .id" \
            | head -1)

          if [ -n "$PREVIOUS_RUN_ID" ] && [ "$PREVIOUS_RUN_ID" != "null" ]; then
            echo "previous_run_id=$PREVIOUS_RUN_ID" >> $GITHUB_OUTPUT
            echo "Found previous run of ${{ inputs.model_name }}: $PREVIOUS_RUN_ID"
          else
            echo "previous_run_id=" >> $GITHUB_OUTPUT
            echo "No previous run of ${{ inputs.model_name }} found"
          fi

      - uses: actions/checkout@v4

      - name: Read inference config
        id: config
        run: |
          MODEL="${{ inputs.model_name }}"

          # Read config from Python (single source of truth)
          CONFIG=$(python3 config/models.py "$MODEL")

          # Parse JSON output
          N_CTX=$(echo "$CONFIG" | python3 -c "import sys,json; print(json.load(sys.stdin)['n_ctx'])")
          N_THREADS=$(echo "$CONFIG" | python3 -c "import sys,json; print(json.load(sys.stdin)['n_threads'])")
          N_BATCH=$(echo "$CONFIG" | python3 -c "import sys,json; print(json.load(sys.stdin)['n_batch'])")
          MAX_CONCURRENT=$(echo "$CONFIG" | python3 -c "import sys,json; print(json.load(sys.stdin)['max_concurrent'])")
          KV_CACHE_QUANT=$(echo "$CONFIG" | python3 -c "import sys,json; c=json.load(sys.stdin); print('true' if c['kv_cache_quant'] else 'false')")

          echo "n_ctx=$N_CTX" >> $GITHUB_OUTPUT
          echo "n_threads=$N_THREADS" >> $GITHUB_OUTPUT
          echo "n_batch=$N_BATCH" >> $GITHUB_OUTPUT
          echo "max_concurrent=$MAX_CONCURRENT" >> $GITHUB_OUTPUT
          echo "kv_cache_quant=$KV_CACHE_QUANT" >> $GITHUB_OUTPUT

          echo "✓ Config for $MODEL: n_ctx=$N_CTX, n_threads=$N_THREADS, n_batch=$N_BATCH, max_concurrent=$MAX_CONCURRENT, kv_cache_quant=$KV_CACHE_QUANT"

      - name: Move Docker data to /mnt
        run: |
          echo "=== Available storage ==="
          df -h / /mnt
          
          # Stop Docker
          sudo systemctl stop docker
          
          # Move Docker data directory to /mnt (has ~66GB free)
          sudo mkdir -p /mnt/docker
          sudo rsync -aP /var/lib/docker/ /mnt/docker/ || true
          sudo rm -rf /var/lib/docker
          sudo ln -s /mnt/docker /var/lib/docker
          
          # Restart Docker
          sudo systemctl start docker
          
          echo "✓ Docker configured to use /mnt"

      - name: Setup environment (parallel)
        run: |
          # Run swap setup in background
          (
            sudo fallocate -l 16G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            sudo sysctl -w vm.swappiness=1 > /dev/null
            sudo sysctl -w vm.vfs_cache_pressure=50 > /dev/null
            echo "✓ Swap enabled: 16GB"
          ) &
          SWAP_PID=$!
          
          # Setup cache directory in background
          (
            sudo mkdir -p /mnt/huggingface-cache
            sudo chown -R 10000:10000 /mnt/huggingface-cache
            echo "✓ Cache directory ready"
          ) &
          CACHE_PID=$!
          
          # Wait for both
          wait $SWAP_PID $CACHE_PID
          echo "✓ Environment setup complete"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull inference image
        run: |
          docker pull "ghcr.io/${{ github.repository_owner }}/serverless-llm/${{ inputs.model_dir }}:latest"
          docker tag "ghcr.io/${{ github.repository_owner }}/serverless-llm/${{ inputs.model_dir }}:latest" "${{ inputs.model_name }}-inference:latest"
          echo "✓ Image pulled and tagged"

      - name: Start inference server
        env:
          MODEL_REPO: ${{ inputs.model_repo }}
          MODEL_FILE: ${{ inputs.model_file }}
          PORT: ${{ inputs.port }}
          HF_TOKEN: ${{ secrets.hf_token }}
          N_CTX: ${{ steps.config.outputs.n_ctx }}
          N_THREADS: ${{ steps.config.outputs.n_threads }}
          N_BATCH: ${{ steps.config.outputs.n_batch }}
          MAX_CONCURRENT: ${{ steps.config.outputs.max_concurrent }}
          KV_CACHE_QUANT: ${{ steps.config.outputs.kv_cache_quant }}
        run: |
          # Start inference server with config from config/inference.yaml
          docker run -d \
            --name inference-server \
            -p ${{ inputs.port }}:${{ inputs.port }} \
            -e MODEL_NAME="${{ inputs.model_name }}" \
            -e MODEL_REPO="$MODEL_REPO" \
            -e MODEL_FILE="$MODEL_FILE" \
            -e PORT="$PORT" \
            -e HF_TOKEN="$HF_TOKEN" \
            -e HF_HOME=/app/.cache/huggingface \
            -e INSTANCE_ID="1" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e N_CTX="$N_CTX" \
            -e N_THREADS="$N_THREADS" \
            -e N_BATCH="$N_BATCH" \
            -e MAX_CONCURRENT="$MAX_CONCURRENT" \
            -e KV_CACHE_QUANT="$KV_CACHE_QUANT" \
            -v /mnt/huggingface-cache:/app/.cache/huggingface \
            ${{ inputs.model_name }}-inference:latest

          echo "✓ Started with: n_ctx=$N_CTX, n_threads=$N_THREADS, n_batch=$N_BATCH, max_concurrent=$MAX_CONCURRENT, kv_cache_quant=$KV_CACHE_QUANT"

          # Health check
          HEALTHY=false
          for i in {1..30}; do
            if ! docker ps | grep -q inference-server; then
              echo "Container stopped unexpectedly"
              echo ""
              echo "=== Full container logs ==="
              docker logs inference-server 2>&1
              echo ""
              echo "=== Container exit code ==="
              docker inspect inference-server --format='{{.State.ExitCode}}'
              echo ""
              echo "=== Memory usage before crash ==="
              free -h
              exit 1
            fi

            RESPONSE=$(curl -s http://localhost:${{ inputs.port }}/health || echo "")
            if echo "$RESPONSE" | grep -q "healthy"; then
              echo "Server ready"
              HEALTHY=true
              break
            fi

            echo "Waiting... ($i/30)"
            sleep 10
          done

          if [ "$HEALTHY" = "false" ]; then
            docker logs inference-server
            exit 1
          fi

      - name: Get tunnel token
        id: tunnel_token
        env:
          TUNNELS_JSON: ${{ secrets.tunnels_json }}
          TUNNEL_TOKEN_SECRET: ${{ secrets.tunnel_token }}
        run: |
          # Try unified script first (reads from TUNNELS_JSON env var automatically)
          TOKEN=$(python3 scripts/get_tunnel_token.py "${{ inputs.model_name }}" --silent 2>/dev/null) || true
          
          # Fallback to individual tunnel_token secret
          if [ -z "$TOKEN" ] && [ -n "$TUNNEL_TOKEN_SECRET" ]; then
            TOKEN="$TUNNEL_TOKEN_SECRET"
            echo "⚠️  Using tunnel_token secret (model not in tunnels.json)"
          fi
          
          if [ -n "$TOKEN" ]; then
            # Mask the token so it never appears in logs
            echo "::add-mask::$TOKEN"
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
            echo "✓ Tunnel token configured for ${{ inputs.model_name }}"
          else
            echo "❌ Error: No tunnel token available for ${{ inputs.model_name }}"
            echo "   - Add model to tunnels.json and update TUNNELS_JSON secret, OR"
            echo "   - Provide tunnel_token secret for this workflow"
            exit 1
          fi

      - name: Start cloudflared
        env:
          TUNNEL_TOKEN: ${{ steps.tunnel_token.outputs.token }}
        run: |
          curl -fsSL -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared tunnel --no-autoupdate --url http://localhost:${{ inputs.port }} run --token "$TUNNEL_TOKEN" > /tmp/cloudflared.log 2>&1 &
          sleep 5
          cat /tmp/cloudflared.log
          echo "✓ Cloudflared started"

      - name: Cancel previous workflow
        if: steps.find_previous.outputs.previous_run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ steps.find_previous.outputs.previous_run_id }}/cancel"

          echo "Graceful handoff: waiting 60s for previous instance to shutdown"
          sleep 60

      - name: Monitor
        env:
          PORT: ${{ inputs.port }}
          TUNNEL_TOKEN: ${{ steps.tunnel_token.outputs.token }}
        run: |
          cleanup() {
            docker stop inference-server 2>/dev/null || true
            docker rm inference-server 2>/dev/null || true
            pkill cloudflared 2>/dev/null || true
            exit 0
          }
          trap cleanup SIGTERM SIGINT

          DURATION_HOURS="${{ inputs.duration_hours }}"
          DURATION=$(awk "BEGIN {printf \"%.0f\", $DURATION_HOURS * 3600}")
          START_TIME=$(date +%s)

          echo "Duration: ${DURATION_HOURS}h"

          while true; do
            ELAPSED=$(($(date +%s) - START_TIME))
            REMAINING=$((DURATION - ELAPSED))

            SERVER_STATUS=$(docker inspect -f '{{.State.Status}}' inference-server 2>/dev/null || echo "stopped")
            TUNNEL_STATUS=$(pgrep -x cloudflared > /dev/null 2>&1 && echo "running" || echo "stopped")

            printf "[%s] Server: %s | Tunnel: %s | %dm elapsed | %dm remaining\n" \
              "$(date '+%H:%M:%S')" "$SERVER_STATUS" "$TUNNEL_STATUS" "$((ELAPSED/60))" "$((REMAINING/60))"

            [ "$SERVER_STATUS" != "running" ] && docker start inference-server
            [ "$TUNNEL_STATUS" != "running" ] && cloudflared tunnel --no-autoupdate --url http://localhost:$PORT run --token "$TUNNEL_TOKEN" >> /tmp/cloudflared.log 2>&1 &

            [ "$ELAPSED" -gt "$DURATION" ] && break
            sleep 30
          done

          cleanup

      - name: Show logs on failure
        if: failure()
        run: |
          docker logs inference-server 2>&1 | tail -100
          cat /tmp/cloudflared.log 2>/dev/null | tail -50
