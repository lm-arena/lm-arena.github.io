name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'app/tunnel-registry/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: app/tunnel-registry
      - run: npx wrangler deploy
        working-directory: app/tunnel-registry
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
