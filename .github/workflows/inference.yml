name: Inference
run-name: "${{ inputs.model }}"
'on':
  workflow_dispatch:
    inputs:
      model:
        description: 'Model name'
        required: true
        type: choice
        options:
          - nanbeige
          - qwen
          - qwenclaude27b
          - smollm3
          - lfm2
          - phireasoning
          - lfm2thinking
          - gemma3n
          - lfm2mini
          - falcon
          - jancode
          - qwen7b
          - rnj
          - gptoss
      benchmark_after:
        description: 'Trigger benchmark run once server is healthy'
        required: false
        default: false
        type: boolean
permissions:
  actions: write
  contents: read
  packages: read
jobs:
  inference:
    name: "${{ inputs.model }}"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/inference
        with:
          model_name: ${{ inputs.model }}
          workflow_file: inference.yml
          duration_hours: '5'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          hf_token: ${{ secrets.HF_TOKEN }}
          tunnel_write_key: ${{ secrets.TUNNEL_WRITE_KEY }}
          benchmark_after: ${{ inputs.benchmark_after }}
