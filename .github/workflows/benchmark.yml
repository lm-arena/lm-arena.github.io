name: Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run benchmarks
        env:
          TUNNEL_WRITE_KEY: ${{ secrets.TUNNEL_WRITE_KEY }}
          REGISTRY: https://tunnel-registry.jonasneves.workers.dev
        run: python scripts/benchmark.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/chat/frontend/public/benchmarks/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: benchmark results $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml --ref main
          echo "✓ Deploy triggered"
